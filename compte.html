<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>JH-TRACK | Connexion sécurisée</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
    font-family:system-ui;
    background: radial-gradient(circle at top, #eaf2ff, #f8fbff);
    min-height:100vh;
    overflow-x:hidden;
}

/* ===== NAV ===== */
.navbar{
    background: rgba(13,110,253,.95);
    backdrop-filter: blur(12px);
}

/* ===== CENTER ===== */
.center{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:120px 15px 40px;
}

/* ===== CARD ===== */
.card-pro{
    width:100%;
    max-width:450px;
    border:none;
    border-radius:28px;
    padding:35px;
    background:white;
    box-shadow:
        0 25px 70px rgba(13,110,253,.18),
        0 5px 15px rgba(0,0,0,.05);
    animation: floatIn .8s ease;
    position:relative;
    overflow:hidden;
}

@keyframes floatIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

/* decoration */
.card-pro::before{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    background:rgba(13,110,253,.08);
    border-radius:50%;
    top:-80px;
    right:-80px;
}

/* ===== ICON ===== */
.icon-circle{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:25px;
    background: linear-gradient(135deg,#0d6efd,#4d8dff);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:40px;
    box-shadow:0 15px 30px rgba(13,110,253,.25);
}

/* ===== INPUT ===== */
.form-control{
    border-radius:16px;
    min-height:55px;
    border:1px solid #e2e8f0;
}

.form-control:focus{
    box-shadow:0 0 0 .25rem rgba(13,110,253,.15);
    border-color:#0d6efd;
}

/* ===== BUTTON ===== */
.btn-pro{
    min-height:55px;
    border-radius:18px;
    font-weight:600;
    letter-spacing:.3px;
    box-shadow:0 12px 25px rgba(13,110,253,.25);
}

/* ===== QUICK LOGIN ===== */
.quick-box{
    background:#f5f9ff;
    border:1px solid #e3edff;
    padding:15px;
    border-radius:18px;
    display:none;
}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    padding:20px;
    color:#6c757d;
    font-size:.85rem;
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark fixed-top shadow-sm">
<div class="container d-flex justify-content-between align-items-center">

<span class="navbar-brand fw-bold">
<i class="bi bi-box-seam"></i> JH-TRACK
</span>

<a href="ACCEUIL.HTML" class="text-white fs-4">
<i class="bi bi-x-circle"></i>
</a>
</div>
</nav>

<!-- MAIN -->
<div class="center">

<div class="card-pro">

<!-- ICON -->
<div class="icon-circle mb-4">
<i class="bi bi-shield-lock-fill"></i>
</div>

<h4 class="text-center fw-bold">Connexion sécurisée</h4>
<p class="text-center text-muted mb-4">
Accès rapide à votre espace client
</p>

<!-- QUICK LOGIN -->
<div id="quickBox" class="quick-box mb-4">

<div class="d-flex justify-content-between align-items-center">

<div>
<div class="fw-bold" id="qName"></div>
<small class="text-muted" id="qTel"></small>
</div>

<button class="btn btn-primary btn-sm px-4"
        onclick="fastLogin()">

Connexion rapide

</button>

</div>

</div>

<!-- FORM -->
<form method="POST" action="login.php">

<div class="mb-3">

<label class="form-label fw-semibold">
Email
</label>

<input type="email"
       name="mail"
       class="form-control"
       placeholder="client@gmail.com"
       required>

</div>

<div class="mb-4">

<label class="form-label fw-semibold">
Mot de passe
</label>

<div class="input-group">

<input type="password"
       name="accesclient"
       id="pwd"
       class="form-control"
       required>

<button type="button"
        class="btn btn-outline-secondary"
        onclick="togglePwd()">

<i id="eye" class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="d-grid gap-3">

<button class="btn btn-primary btn-pro">

<i class="bi bi-box-arrow-in-right"></i>
Connexion

</button>

<a href="ACCEUIL.HTML" class="btn btn-outline-danger btn-pro">
    <i class="bi bi-house"></i>
    Quitter
</a>
    <a href="créationcompte.html" class="btn btn-outline-danger btn-pro">
    <i class="bi bi-house"></i>
    Créer un compte
</a>

</div>

</form>

</div>

</div>

<footer>
Nzobazola — IT Consulting 4.0
</footer>

<script>

/* ===== LOCAL MEMORY ===== */

/* récupération mémoire */
let n = localStorage.getItem("Nomclient");
let t = localStorage.getItem("telephone");
let m = localStorage.getItem("mail");
let a = localStorage.getItem("accesclient");

/* affichage connexion rapide */
if(n && m){
    document.getElementById("quickBox").style.display="block";
    document.getElementById("qName").innerText = n;
    document.getElementById("qTel").innerText = m;
}

/* remplir automatiquement email et accesclient */
if(m){
    document.querySelector('input[name="mail"]').value = m;
}

if(a){
    document.querySelector('input[name="accesclient"]').value = a;
}

/* connexion rapide */
function fastLogin(){
    document.querySelector('input[name="mail"]').value = localStorage.getItem("mail");
    document.querySelector('input[name="accesclient"]').value = localStorage.getItem("accesclient");

    document.querySelector("form").submit();
}

/* ===== PASSWORD ===== */
function togglePwd(){

    let p = document.getElementById("pwd");
    let i = document.getElementById("eye");

    if(p.type === "password"){
        p.type="text";
        i.className="bi bi-eye-slash";
    }else{
        p.type="password";
        i.className="bi bi-eye";
    }
}

/* ===== SAVE LOGIN ===== */
document.querySelector("form").addEventListener("submit", function(){

    /* récupérer valeurs */
    let mail = document.querySelector('input[name="mail"]').value;
    let acces = document.querySelector('input[name="accesclient"]').value;

    /* sauvegarde rapide */
    localStorage.setItem("mail", mail);
    localStorage.setItem("accesclient", acces);

    /*
      IMPORTANT :
      login.php doit renvoyer :
      nom
      telephone
      cnx = 1
    */

});

</script>

</body>
</html>
